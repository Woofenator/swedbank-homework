<mat-tab-group
    dynamicHeight
    [selectedIndex]="activeTab()"
    (selectedIndexChange)="activeTab.set($event)"
>
    <mat-tab label="Login">
        <app-login-form (loggedIn)="onLogin()" />
    </mat-tab>
    <mat-tab label="Register">
        <app-register-form (registered)="onRegistered()" />
    </mat-tab>
</mat-tab-group>
