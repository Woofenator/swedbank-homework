<form [formRoot]="loginForm">
    <mat-card class="">
        <mat-card-header>
            <mat-card-title>Login {{ token() }}</mat-card-title>
        </mat-card-header>
        <mat-card-content>
            <!-- I would have made form row components, but I cannot get Material Angular to work with Signal Forms in a reasonable time frame -->
            <div class="row-auto">
                <mat-form-field class="full-width" appearance="fill">
                    <mat-label>Username</mat-label>
                    <input
                        matInput
                        placeholder="Example"
                        [formField]="loginForm.username"
                    />
                    @if (!loginForm.username().valid()) {
                        <mat-error>{{
                            loginForm.username().errors()[0].message
                        }}</mat-error>
                    }
                </mat-form-field>
            </div>
            <div class="row-auto">
                <mat-form-field class="full-width" appearance="fill">
                    <mat-label>Password</mat-label>
                    <input
                        matInput
                        placeholder="Example"
                        [type]="passwordHide() ? 'password' : 'text'"
                        [formField]="loginForm.password"
                    />
                    <button
                        matIconButton
                        matSuffix
                        type="button"
                        (click)="passwordClickEvent($event)"
                        [attr.aria-label]="'Hide password'"
                        [attr.aria-pressed]="passwordHide()"
                    >
                        <mat-icon>{{
                            passwordHide() ? "visibility_off" : "visibility"
                        }}</mat-icon>
                    </button>
                    @if (!loginForm.password().valid()) {
                        <mat-error>{{
                            loginForm.password().errors()[0].message
                        }}</mat-error>
                    }
                </mat-form-field>
            </div>
        </mat-card-content>
        <mat-card-actions>
            <button
                matButton="outlined"
                type="submit"
                primary
                [disabled]="loginForm().submitting()"
            >
                @if (loginForm().submitting()) {
                    <mat-progress-spinner
                        progressIndicator
                        mode="indeterminate"
                        diameter="20"
                        aria-label="Loading"
                        tabindex=""
                    />
                } @else {
                    Submit
                }
            </button>
        </mat-card-actions>
    </mat-card>
</form>
